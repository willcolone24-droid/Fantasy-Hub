<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Wild Card — Will's Fantasy Baseball Hub</title>
<style>
:root{
 --bg:#f6f7f9;--bg2:#eef0f3;--panel:#ffffff;--panel2:#f4f5f7;--panel3:#eaecef;
 --line:#e3e6ea;--line2:#d2d6dc;--tx:#1a1d21;--tx2:#3a3f46;--mut:#697079;
 --red:#d50a0a;--blu:#0b6ec9;--teal:#0b6ec9;--grn:#1a8a3f;--gold:#b8780f;--org:#e36b00;--ink:#ffffff;
 --pink:#d50a0a;--purple:#0b6ec9;--yellow:#c8860a;--navy:#16181c;
 --rad:10px;--shadow:0 1px 3px rgba(20,28,40,.08),0 1px 1px rgba(20,28,40,.04);
 --mono:"SF Mono",ui-monospace,"Roboto Mono",Menlo,Consolas,monospace;}
*{box-sizing:border-box}
body{margin:0;color:var(--tx);background:var(--bg);font-family:-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
.wrap{max-width:1320px;margin:0 auto;padding:0 18px}
b,.num{font-variant-numeric:tabular-nums}
/* header / HUD — ESPN dark top strip */
header{position:sticky;top:0;z-index:60;background:#16181c;border-bottom:3px solid var(--red);box-shadow:0 2px 8px rgba(0,0,0,.18)}
.topline{display:none}
.htop{display:flex;align-items:center;gap:13px;padding:11px 0 9px}
.logo{width:40px;height:40px;border-radius:8px;flex:0 0 auto;position:relative;background:var(--red);box-shadow:none}
.logo:before,.logo:after{content:"";position:absolute;top:10px;bottom:10px;width:8px;border:2px solid #fff;border-radius:50%}
.logo:before{left:10px;border-right:none;border-top:none;transform:rotate(8deg)}
.logo:after{right:10px;border-left:none;border-bottom:none;transform:rotate(8deg)}
.brandwrap{flex:1 1 auto;min-width:0}
h1.brand{font-size:19px;margin:0;letter-spacing:.5px;font-weight:800;text-transform:uppercase;color:#fff}
h1.brand span{color:#fff;background:var(--red);padding:0 6px;border-radius:4px;margin-left:2px}
.sub{color:#9aa2ad;font-size:11px;margin-top:2px}
.live{display:inline-flex;align-items:center;gap:6px;font-size:10.5px;font-weight:800;letter-spacing:.6px;color:#fff;background:var(--red);border:none;padding:5px 10px;border-radius:5px;text-transform:uppercase}
.livedot{width:7px;height:7px;border-radius:50%;background:#fff;animation:pulse 1.6s infinite}
@keyframes pulse{0%{opacity:1}50%{opacity:.35}100%{opacity:1}}
.hud{display:grid;grid-auto-flow:column;grid-auto-columns:1fr;gap:1px;background:#2a2d33;border:1px solid #2a2d33;border-radius:8px;overflow:hidden;margin:2px 0 10px}
@media(max-width:760px){.hud{grid-auto-flow:row;grid-template-columns:repeat(3,1fr);grid-auto-columns:auto}}
@media(max-width:460px){.hud{grid-template-columns:repeat(2,1fr)}}
.hud-tile{background:#1d2025;padding:8px 12px;min-width:0}
.hud-tile .k{font-size:9px;letter-spacing:.7px;text-transform:uppercase;color:#8b929b;font-weight:700}
.hud-tile .v{font-size:14px;font-weight:800;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-variant-numeric:tabular-nums;color:#fff}
/* nav */
nav{display:flex;gap:2px;flex-wrap:wrap;padding-bottom:8px}
nav button{background:transparent;border:none;color:#c4cad2;padding:8px 14px;border-radius:5px;cursor:pointer;font-size:12px;font-weight:700;letter-spacing:.3px;text-transform:uppercase}
nav button:hover{color:#fff;background:#23262c}
nav button.active{color:#fff;background:transparent;box-shadow:inset 0 -3px 0 var(--red)}
main{padding:20px 0 64px}
.tab{display:none}.tab.active{display:block;animation:fade .25s ease}
@keyframes fade{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
.row{display:flex;gap:14px;flex-wrap:wrap}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px}
@media(max-width:520px){.cards{grid-template-columns:repeat(2,1fr);gap:10px}}
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--rad);padding:14px 15px;position:relative;overflow:hidden;box-shadow:var(--shadow)}
.card:before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--red)}
.card .lab{font-size:10px;color:var(--mut);text-transform:uppercase;letter-spacing:.7px;font-weight:700}
.card .big{font-size:28px;font-weight:800;margin-top:3px;font-variant-numeric:tabular-nums;color:var(--tx)}
.card .note{font-size:11px;color:var(--mut);margin-top:3px}
.acc{display:none}
.sec{font-size:13px;font-weight:800;margin:24px 0 12px;display:flex;align-items:center;gap:9px;letter-spacing:.4px;text-transform:uppercase;color:var(--tx)}
.sec .pip{width:5px;height:16px;border-radius:2px;background:var(--red)}
.sec:after{content:"";flex:1;height:1px;background:var(--line)}
.panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--rad);padding:14px;margin-bottom:14px;box-shadow:var(--shadow)}
table{width:100%;border-collapse:collapse;font-size:12.5px;font-variant-numeric:tabular-nums}
th,td{padding:8px 9px;text-align:center;border-bottom:1px solid var(--line);white-space:nowrap}
th{position:sticky;top:0;background:#f1f3f5;color:var(--mut);font-size:10px;text-transform:uppercase;letter-spacing:.4px;cursor:pointer;user-select:none;z-index:2;border-bottom:2px solid var(--line2)}
th:hover{color:var(--red)}
td.l,th.l{text-align:left}
tbody tr{cursor:pointer;transition:background .1s}
tbody tr:nth-child(even){background:#fafbfc}
tbody tr:hover{background:#eef5fb}
.tbl{overflow:auto;max-height:76vh;border:1px solid var(--line);border-radius:8px;background:#fff;box-shadow:var(--shadow);-webkit-overflow-scrolling:touch}
.ph{width:32px;height:32px;border-radius:50%;background:#e6e9ee;object-fit:cover;vertical-align:middle;border:1px solid var(--line2)}
.pcell{display:flex;align-items:center;gap:8px;text-align:left}
.pcell .nm{font-weight:700}
.tag{font-size:9.5px;font-weight:800;padding:2px 7px;border-radius:4px;display:inline-block;letter-spacing:.2px}
.chip{font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;background:#eef1f4;color:var(--tx2);border:1px solid var(--line2)}
.fa{background:#fdeef0;color:#b00735;border-color:#f3cdd5}
.tr-hot{color:var(--org);font-weight:800}.tr-cold{color:var(--blu);font-weight:800}.tr-steady{color:var(--mut)}
.tier{font-weight:800;padding:2px 7px;border-radius:4px;font-size:10px;letter-spacing:.2px;text-transform:uppercase}
.t-Elite{background:#e4f4ea;color:#137a3a;border:1px solid #b9e2c8}
.t-Strong{background:#e4eefb;color:#0b6ec9;border:1px solid #bcd6f3}
.t-Solid{background:#eef1f4;color:#41506a;border:1px solid var(--line2)}
.t-Role{background:#fbf1da;color:#9a6310;border:1px solid #ecd9ab}
.t-Bench{background:#fbe6e6;color:#c01818;border:1px solid #f2c4c4}
.controls{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:12px}
input,select{background:#fff;border:1px solid var(--line2);color:var(--tx);padding:9px 11px;border-radius:7px;font-size:13px;outline:none}
input:focus,select:focus{border-color:var(--blu);box-shadow:0 0 0 3px rgba(11,110,201,.12)}
.seg{display:inline-flex;background:#eef1f4;border:1px solid var(--line2);border-radius:7px;overflow:hidden}
.seg button{background:transparent;border:none;color:var(--mut);padding:8px 13px;cursor:pointer;font-weight:700;font-size:12px}
.seg button.on{background:var(--red);color:#fff}
.btn{background:var(--red);border:none;color:#fff;padding:9px 14px;border-radius:7px;cursor:pointer;font-weight:700;font-size:13px}
.btn.g{background:#eef1f4;color:var(--tx);border:1px solid var(--line2)}
.btn.sm{padding:6px 11px;font-size:12px}
.alert{display:flex;gap:10px;align-items:flex-start;padding:11px 13px;border-radius:8px;margin-bottom:8px;border:1px solid var(--line);background:#fff;border-left-width:3px;box-shadow:var(--shadow)}
.alert .dot{width:8px;height:8px;border-radius:50%;margin-top:6px;flex:0 0 auto}
.a-warn{border-left-color:var(--gold)}.a-warn .dot{background:var(--gold)}
.a-buy{border-left-color:var(--grn)}.a-buy .dot{background:var(--grn)}
.a-sell{border-left-color:var(--org)}.a-sell .dot{background:var(--org)}
.a-good{border-left-color:var(--blu)}.a-good .dot{background:var(--blu)}
.two{display:grid;grid-template-columns:1fr 1fr;gap:14px}@media(max-width:820px){.two{grid-template-columns:1fr}}
.muted{color:var(--mut)}.lgd{font-size:11px;color:var(--mut);margin-top:8px;line-height:1.5}
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:11px}
@media(max-width:480px){.pgrid{grid-template-columns:1fr 1fr;gap:9px}}
.pc{background:var(--panel);border:1px solid var(--line);border-radius:var(--rad);padding:13px;cursor:pointer;transition:.12s;box-shadow:var(--shadow)}
.pc:hover{border-color:var(--blu);box-shadow:0 3px 10px rgba(11,110,201,.14)}
.pc .top{display:flex;gap:10px;align-items:center}
.pc .ph2{width:50px;height:50px;border-radius:50%;background:#e6e9ee;object-fit:cover;border:2px solid var(--line2)}
.pc .nm{font-weight:800;font-size:13.5px}.pc .meta{font-size:11px;color:var(--mut);margin-top:1px}
.pc .stats{display:flex;justify-content:space-between;margin-top:11px;border-top:1px solid var(--line);padding-top:9px}
.pc .stat{text-align:center}.pc .stat b{font-size:16px;display:block;font-variant-numeric:tabular-nums;color:var(--tx)}.pc .stat span{font-size:9px;color:var(--mut);text-transform:uppercase}
.ov{position:fixed;inset:0;background:rgba(20,28,40,.45);display:none;align-items:center;justify-content:center;z-index:100;padding:18px}
.ov.on{display:flex}
.modal{background:#fff;border:1px solid var(--line2);border-radius:12px;max-width:580px;width:100%;overflow:hidden;box-shadow:0 24px 60px rgba(20,28,40,.3)}
.mhead{display:flex;gap:14px;align-items:center;padding:18px;background:#16181c;color:#fff}
.mhead img{width:72px;height:72px;border-radius:50%;background:#e6e9ee;object-fit:cover;border:2px solid var(--red)}
.mhead .nm{font-size:20px;font-weight:800;color:#fff}.mhead .meta{color:#aab1ba;font-size:12px;margin-top:3px}
.mbody{padding:16px 18px}
.mrow{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}
@media(max-width:520px){.mrow{grid-template-columns:repeat(2,1fr)}}
.mstat{background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:9px;text-align:center}
.mstat b{font-size:16px;display:block;font-variant-numeric:tabular-nums;color:var(--tx)}.mstat span{font-size:9px;color:var(--mut);text-transform:uppercase;letter-spacing:.3px}
.mclose{position:absolute;top:14px;right:16px;color:#fff;background:rgba(255,255,255,.18);border:none;border-radius:7px;width:30px;height:30px;cursor:pointer;font-size:16px}
.sugg{border:1px solid var(--line);border-radius:10px;padding:13px;margin-bottom:10px;background:#fff}
.bar{height:15px;border-radius:7px;background:#e6e9ee;overflow:hidden;display:flex;margin:6px 0;border:1px solid var(--line2)}
.bar .g{background:var(--grn)}.bar .r{background:var(--red)}
.verdict{font-size:22px;font-weight:800}
.chiprow{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;min-height:20px}
.tk{display:inline-flex;align-items:center;gap:6px;background:var(--panel2);border:1px solid var(--line2);border-radius:16px;padding:4px 10px;font-size:12px}
.tk .x{color:var(--red);cursor:pointer;font-weight:800}
ul.tt{margin:7px 0;padding-left:18px}ul.tt li{margin:5px 0;color:var(--tx2)}
.pill2{font-size:11px;padding:2px 9px;border-radius:16px;background:#e4eefb;color:var(--blu);font-weight:700;border:1px solid #bcd6f3}
/* clickable name + tooltip */
.pn{cursor:pointer;color:var(--blu);border-bottom:1px dotted transparent;transition:.1s}
.pn:hover{color:var(--red);border-bottom-color:var(--red)}
.ptip{position:absolute;z-index:200;display:none;background:#fff;border:1px solid var(--line2);border-radius:9px;padding:11px;box-shadow:0 10px 30px rgba(20,28,40,.22);pointer-events:none;font-size:12px}
.ptip-h{display:flex;align-items:center;gap:9px;margin-bottom:8px}
.ptip-h img{width:36px;height:36px;border-radius:50%;background:#e6e9ee;object-fit:cover;border:1px solid var(--line2)}
.ptip-m{font-size:10.5px;color:var(--mut);margin-top:1px}
.ptip-r{display:flex;justify-content:space-between;gap:6px;border-top:1px solid var(--line);border-bottom:1px solid var(--line);padding:7px 0;margin-bottom:7px}
.ptip-r span{font-size:9.5px;color:var(--mut);text-transform:uppercase;text-align:center}.ptip-r b{display:block;font-size:13px;color:var(--tx);margin-top:2px}
.ptip-s{font-size:11.5px;color:var(--tx2)}
/* day nav + matchup */
.daynav{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px}
.daynav button{background:#eef1f4;border:1px solid var(--line2);color:var(--mut);padding:7px 13px;border-radius:7px;cursor:pointer;font-weight:700;font-size:12px;text-transform:uppercase;letter-spacing:.3px}
.daynav button.on{background:var(--red);color:#fff;border-color:var(--red)}
.mx-scoreboard{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:12px;background:#16181c;border:1px solid #16181c;border-radius:10px;padding:16px;margin-bottom:12px;color:#fff}
.mx-nm{font-size:12.5px;font-weight:700;color:#c8ced6;text-transform:uppercase;letter-spacing:.4px}
.mx-tot{font-size:36px;font-weight:800;font-variant-numeric:tabular-nums;color:#fff;line-height:1}
.mx-mid{text-align:center;font-size:12.5px;font-weight:800;color:#fff;text-transform:uppercase;letter-spacing:.6px}
.mx-sub{font-size:9px;color:#9aa2ad;font-weight:700;letter-spacing:.4px}
.mxtbl td{border-bottom:1px solid var(--line)}
.mx-me{text-align:right}.mx-op{text-align:left}
.mx-slot{font-size:10px;font-weight:800;color:var(--mut);background:#f1f3f5;width:46px}
.mx-pt{display:inline-block;min-width:34px;font-weight:800;font-variant-numeric:tabular-nums;color:var(--tx2);padding:0 8px}
.mx-pt.win{color:var(--grn)}
.mx-pt.act{color:var(--tx);font-weight:900}
.mx-me .mx-pt{margin-left:8px}.mx-op .mx-pt{margin-right:8px}
.mx-sec td{background:#f1f3f5;color:var(--tx);font-weight:800;text-transform:uppercase;font-size:10px;letter-spacing:.5px;text-align:left}
.mx-total td{border-top:2px solid var(--line2);background:#eef5fb;font-weight:800}
.mx-total td b{font-size:15px;color:var(--red)}
/* profile */
.prof{max-width:860px}
.prof-head{display:flex;gap:16px;align-items:center;padding:18px;background:#16181c;border-radius:12px;margin:10px 0 8px;color:#fff}
.prof-img{width:90px;height:90px;border-radius:50%;background:#e6e9ee;object-fit:cover;border:3px solid var(--red)}
.prof-nm{font-size:24px;font-weight:800;color:#fff}
.prof-meta{color:#aab1ba;font-size:13px;margin-top:4px}
@media(max-width:560px){.wrap{padding:0 12px}.mx-tot{font-size:28px}.prof-img{width:64px;height:64px}.prof-nm{font-size:20px}h1.brand{font-size:16px}.card .big{font-size:24px}}

</style></head>
<body>
<header>
 <div class="topline"></div>
 <div class="wrap">
 <div class="htop">
 <div class="logo"></div>
 <div class="brandwrap"><h1 class="brand">WILD CARD <span>HUB</span></h1>
 <div class="sub">Will's Wild Team · 2026 Fantasy Baseball · H2H Points · League #622960213 · refreshed Jun 29</div></div>
 <div class="live"><span class="livedot"></span> Live · MP14</div>
 </div>
 <div class="hud" id="hud"></div>
 <nav id="nav"></nav>
 </div>
</header>
<main class="wrap">
 <div class="tab" id="t-dash"></div>
 <div class="tab" id="t-matchup"></div>
 <div class="tab" id="t-team"></div>
 <div class="tab" id="t-players"></div>
 <div class="tab" id="t-trade"></div>
 <div class="tab" id="t-strategy"></div>
 <div class="tab" id="t-analytics"></div>
 <div class="tab" id="t-profile"></div>
</main>
<div class="ov" id="ov"><div class="modal" id="modal" style="position:relative"></div></div>
<script>
const DATA=/*__DATA__*/null;
const P=DATA.players, WWT="WWT";
const TN=DATA.teamNames;
const byId=id=>P.find(p=>p.id===id);
const esc=s=>(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;");
const photo=id=>`https://a.espncdn.com/combiner/i?img=/i/headshots/mlb/players/full/${id}.png&w=80&h=80&scale=crop&cquality=40`;
const ph=(id,c="ph")=>`<img class="${c}" loading="lazy" src="${photo(id)}" onerror="this.style.opacity=0">`;
const injTxt=i=>i?`<span class="tag" style="background:#fdeef0;color:#b00735">${i.replace(/_DAY_DL/,'').replace('TEN','IL10').replace('FIFTEEN','IL15').replace('SIXTY','IL60').replace('SEVEN','IL7').replace('DAY_TO_DAY','DTD').replace('BEREAVEMENT','BRV').replace('SUSPENSION','SUSP')}</span>`:"";
const trendTxt=t=>t==="hot"?'<span class="tr-hot">▲ Hot</span>':t==="cold"?'<span class="tr-cold">▼ Cold</span>':'<span class="tr-steady">→ Steady</span>';
const tierTxt=t=>`<span class="tier t-${t}">${t}</span>`;
const TABS=[["dash","Dashboard"],["matchup","Matchup"],["team","My Team"],["players","Player Universe"],["trade","Waiver Hub"],["analytics","Analytics"],["strategy","Strategy"]];
const nav=document.getElementById("nav");
TABS.forEach(([id,l])=>{const b=document.createElement("button");b.textContent=l;b.id="n-"+id;b.onclick=()=>show(id);nav.appendChild(b)});
function show(id){TABS.forEach(([t])=>{document.getElementById("t-"+t).classList.toggle("active",t===id);document.getElementById("n-"+t).classList.toggle("active",t===id)});const pr=document.getElementById("t-profile");if(pr)pr.classList.remove("active");scrollTo(0,0)}

/* ---- modal ---- */
const ov=document.getElementById("ov");ov.onclick=e=>{if(e.target===ov)ov.classList.remove("on")};
/* ---- player profile (full screen) + hover tooltip ---- */
function advList(p){return p.type==="H"
 ? [["AVG",p.st.AVG],["OBP",p.st.OBP],["SLG",p.st.SLG],["OPS",p.st.OPS],["HR",p.st.HR],["R",p.st.R],["RBI",p.st.RBI],["SB",p.st.SB],["BB",p.st.BB],["K",p.st.K],["ISO",p.st.ISO],["BB%",p.st["BB%"]],["K%",p.st["K%"]],["PA",p.st.PA]]
 : [["ERA",p.st.ERA],["WHIP",p.st.WHIP],["K/9",p.st.K9],["K",p.st.K],["W",p.st.W],["L",p.st.L],["SV",p.st.SV],["HD",p.st.HD],["IP",p.st.IP],["GS",p.st.GS],["K/BB",p.st["K/BB"]],["BB/9",p.st.BB9],["H/9",p.st.H9]];}
let profileBack="dash";
function openP(id){const p=byId(+id);if(!p)return;
 const cur=TABS.find(([t])=>document.getElementById("t-"+t).classList.contains("active"));
 if(cur)profileBack=cur[0];
 document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
 const adv=advList(p);
 const el=document.getElementById("t-profile");
 el.innerHTML=`<button class="btn g sm" onclick="show(profileBack)">← Back</button>
 <div class="prof">
 <div class="prof-head">
 <img class="prof-img" src="${photo(p.id)}" onerror="this.style.opacity=0">
 <div><div class="prof-nm">${esc(p.name)} ${injTxt(p.inj)}</div>
 <div class="prof-meta">${esc(p.pos)} · ${p.mlb} · ${p.ft==="FA"?'<span class="chip fa">Free Agent</span>':'Rostered: '+esc(TN[p.ft]||p.ft)}</div>
 <div style="margin-top:9px">${tierTxt(p.tier)} ${trendTxt(p.trend)}</div></div>
 </div>
 <div class="sec"><span class="pip"></span>Production & Projection</div>
 <div class="mrow">
 <div class="mstat"><b>${p.std??'-'}</b><span>Season Pts</span></div>
 <div class="mstat"><b style="color:var(--gold)">${p.myros}</b><span>My ROS</span></div>
 <div class="mstat"><b style="color:var(--grn)">${p.projWk}</b><span>Proj Week</span></div>
 <div class="mstat"><b>${p.projDay}</b><span>Proj / Day</span></div>
 </div>
 <div class="mrow">
 <div class="mstat"><b>${p.l30??'-'}</b><span>Last 30</span></div>
 <div class="mstat"><b>${p.l15??'-'}</b><span>Last 15</span></div>
 <div class="mstat"><b>${p.l7??'-'}</b><span>Last 7</span></div>
 ${p.type==="P"?`<div class="mstat"><b>${p.startsWk==null?'-':p.startsWk}</b><span>Starts Wk</span></div>`:`<div class="mstat"><b>${p.st.HR??'-'}</b><span>HR</span></div>`}
 </div>
 ${profAnalytics(p)}
 <div class="sec"><span class="pip"></span>2026 Stats & Advanced Metrics</div>

/* ---- sortable table ---- */
function tableEl(rows,cols,sortKey){
 let dir=-1,sk=sortKey;
 const wrap=document.createElement("div");wrap.className="tbl";const t=document.createElement("table");wrap.appendChild(t);
 const gv=(o,k)=>{if(k in o)return o[k];if(o.st&&k in o.st)return o.st[k];return null};
 function draw(){rows.sort((a,b)=>{let x=gv(a,sk),y=gv(b,sk);if(x==null)x=-1e9;if(y==null)y=-1e9;if(typeof x==="string")return dir*x.localeCompare(y);return dir*(x-y)});
 t.innerHTML="<thead><tr>"+cols.map(c=>`<th class="${c.l?'l':''}" data-k="${c.k}">${c.t}${sk===c.k?(dir<0?" ▾":" ▴"):""}</th>`).join("")+"</tr></thead><tbody>"+
 rows.map(r=>"<tr data-id='"+r.id+"'>"+cols.map(c=>`<td class="${c.l?'l':''}">${c.r(r)}</td>`).join("")+"</tr>").join("")+"</tbody>";
 t.querySelectorAll("th").forEach(th=>th.onclick=()=>{const k=th.dataset.k;if(k===sk)dir*=-1;else{sk=k;dir=-1}draw()});
 t.querySelectorAll("tbody tr").forEach(tr=>tr.onclick=()=>openP(tr.dataset.id));
 }
 draw();return wrap;
}

 <div class="card"><div class="lab">Calibration Gap</div><div class="big" style="color:var(--org)">${A.calibration.gap>=0?'+':''}${A.calibration.gap}</div><div class="note">model targets your ceiling</div></div>
 </div>
 <div class="sec"><span class="pip"></span>Week-by-Week — My Projection vs ESPN Actual</div>
 <div class="panel"><div class="tbl"><table><thead><tr><th>MP</th><th class="l">Opponent</th><th>My Proj</th><th>ESPN Actual</th><th>Error</th><th>Accuracy</th></tr></thead><tbody>
 ${A.weekByWeek.map(w=>`<tr><td>${w.mp}</td><td class="l">${esc(w.opp)}</td><td style="color:var(--teal);font-weight:800">${w.proj}</td><td>${w.actual==null?'<span class="muted">in progress</span>':'<b>'+w.actual+'</b>'}</td><td>${w.err==null?'—':(w.err>=0?'+':'')+w.err}</td><td>${w.acc==null?'—':'<b style="color:var(--grn)">'+w.acc+'%</b>'}</td></tr>`).join("")}
 </tbody></table></div></div>
 <div class="sec"><span class="pip"></span>Day-by-Day — This Week (MP${A.startMP})</div>
 <div class="panel"><div class="tbl"><table><thead><tr><th class="l">Day</th><th>My Proj</th><th>Actual</th><th>Error</th></tr></thead><tbody>
 ${A.dayByDay.map(d=>`<tr><td class="l">${d.day}</td><td style="color:var(--teal);font-weight:800">${d.proj}</td><td>${d.actual==null?'<span class="muted">—</span>':'<b>'+d.actual+'</b>'}</td><td>${d.actual==null?'—':((d.actual-d.proj>=0?'+':'')+(d.actual-d.proj).toFixed(1))}</td></tr>`).join("")}
 </tbody></table></div>
 <div class="lgd">Actuals fill in automatically with the daily 6 AM refresh as each day's games finalize. Accuracy % = 100 − |error| ÷ actual. This week (MP14) is the first tracked — the log grows each week.</div></div>`;
}

function matchup(){
 const M=DATA.matchup, me=M.me, op=M.opp;
 const lg=[...DATA.teams].sort((a,b)=>b.projWk-a.projWk); const myRank=lg.findIndex(t=>t.code===WWT)+1;
 const sideCard=(t,you)=>`<div class="card" style="text-align:center;${you?'border-color:var(--grn)':''}">
 <div style="font-size:16px;font-weight:900">${esc(t.name)}</div>
 <div class="muted" style="margin-bottom:6px">${t.rec}${you?' · <b style="color:var(--grn)">YOU</b>':''}</div>
 <div style="font-size:42px;font-weight:900;color:var(--gold);line-height:1">${t.proj}</div>
 <div class="lab">projected this week</div>
 <div class="muted" style="margin-top:8px"> Hitting <b>${t.hit}</b> · Pitching <b>${t.pit}</b></div></div>`;
 let h=`<div class="panel" style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px">
 <div><b> Matchup Period ${M.mp}</b><span class="muted">· ${M.week} · H2H Points</span></div>
 <div class="muted">Live score: <b>${esc(M.live)}</b></div></div>
 <div class="two">${sideCard(me,true)}${sideCard(op,false)}</div>
 <div class="sec"><span class="pip"></span>Win Probability</div>
 <div class="panel"><div class="bar" style="height:28px;border-radius:9px">
 <div class="g" style="width:${M.winMe}%;display:flex;align-items:center;justify-content:center;color:#ffffff;font-weight:900;font-size:13px">${M.winMe>12?M.winMe+"%":""}</div>
 <div class="r" style="width:${M.winOpp}%;display:flex;align-items:center;justify-content:center;color:#ffffff;font-weight:900;font-size:13px">${M.winOpp>12?M.winOpp+"%":""}</div></div>
 <div class="lgd">You <b style="color:var(--grn)">${M.winMe}%</b> · ${esc(op.name)} <b style="color:var(--red)">${M.winOpp}%</b> — projected margin <b>${M.margin>=0?"+":""}${M.margin}</b> pts. Model blends season pace + recent form, scaled to this week's games (pitchers weighted by confirmed starts).</div></div>
 <div class="sec"><span class="pip"></span>The Read</div>
 ${M.insights.map(i=>`<div class="alert a-good"><span class="dot"></span><div>${i}</div></div>`).join("")}
 <div class="sec"><span class="pip"></span>Projected Day-by-Day Race</div>
 <div class="panel">${raceSVG(M.dayRace,me.name,op.name)}
 <div class="lgd">Cumulative projected points across the week.</div>
 <div class="tbl" style="margin-top:10px"><table><thead><tr><th class="l">Projected / day</th>${M.dayRace.days.map(d=>`<th>${d}</th>`).join("")}<th>Total</th></tr></thead><tbody>
 <tr><td class="l" style="color:var(--grn);font-weight:800">You</td>${M.dayRace.meDaily.map(v=>`<td>${v}</td>`).join("")}<td style="color:var(--gold);font-weight:900">${me.proj}</td></tr>
 <tr><td class="l" style="color:var(--red);font-weight:800">${esc(op.name)}</td>${M.dayRace.oppDaily.map(v=>`<td>${v}</td>`).join("")}<td style="font-weight:900">${op.proj}</td></tr>
 </tbody></table></div></div>
 <div class="sec"><span class="pip"></span>Head-to-Head Lineups — Step Through Each Day</div><div class="daynav" id="mxnav"></div><div id="mxbody"></div><div class="sec"><span class="pip"></span>Weekly Edge — Slot by Slot</div>
 <div class="panel"><div class="tbl"><table><thead><tr><th>Slot</th><th class="l">Your starter</th><th>Proj</th><th>Edge</th><th>Proj</th><th class="l">Their starter</th></tr></thead><tbody>
 ${M.slotEdges.map(e=>{const mw=e.win==="me",ow=e.win==="opp";
 return `<tr>
 <td><b>${e.slot}</b></td>
 <td class="l">${e.me?`<span class="pcell"><img class="ph" src="${photo(e.me.id)}" onerror="this.style.opacity=0"><span><span class="nm pn" data-id="${e.me.id}">${esc(e.me.name)}</span><span class="muted">${e.me.mlb}</span></span></span>`:"—"}</td>
 <td style="${mw?'color:var(--grn);font-weight:800':''}">${e.me?e.me.projWk:0}</td>
 <td>${mw?'<span style="color:var(--grn);font-weight:900">◀ YOU</span>':ow?'<span style="color:var(--red);font-weight:900">OPP ▶</span>':'<span class="muted">even</span>'}</td>
 <td style="${ow?'color:var(--red);font-weight:800':''}">${e.opp?e.opp.projWk:0}</td>
 <td class="l">${e.opp?`<span class="pcell"><img class="ph" src="${photo(e.opp.id)}" onerror="this.style.opacity=0"><span><span class="nm pn" data-id="${e.opp.id}">${esc(e.opp.name)}</span><span class="muted">${e.opp.mlb}</span></span></span>`:"—"}</td></tr>`;}).join("")}
 </tbody></table></div></div>
 <div class="sec"><span class="pip"></span>Bench &amp; Daily Swap Options</div><div class="two">${benchCard(me,true)}${benchCard(op,false)}</div><div class="sec"><span class="pip"></span>Pitching Staff & Two-Start Edge</div>
 <div class="two">${pStaff(me,true)}${pStaff(op,false)}</div>
 <div class="panel"><b>Two-start arms this week —</b> You: ${M.twoStartMe.map(p=>`<span class="chip" style="background:#e4f3ea;color:var(--grn)">${esc(p.name)} (${p.days.join(" & ")})</span>`).join(" ")||'<span class="muted">none</span>'} &nbsp;·&nbsp; ${esc(op.name)}: ${M.twoStartOpp.map(p=>`<span class="chip" style="background:#fdeef0;color:var(--red)">${esc(p.name)} (${p.days.join(" & ")})</span>`).join(" ")||'<span class="muted">none</span>'}
 <div class="lgd" style="margin-top:6px">More starts = more innings, strikeouts and win/quality-start chances. This is the biggest single lever in a weekly points matchup.</div></div>`;

 h+=`<div class="sec"><span class="pip"></span>Around the League — Projected Weekly Scoring</div>
 <div class="panel"><div class="tbl"><table><thead><tr><th>#</th><th class="l">Team</th><th>Proj Wk</th><th>Proj/Day</th><th>Rec</th></tr></thead><tbody>
 ${lg.map((t,i)=>`<tr style="${t.code===WWT?'background:#eef7f1':''}"><td>${i+1}</td><td class="l">${esc(t.name)}</td><td><b style="color:var(--gold)">${t.projWk}</b></td><td>${t.projDay}</td><td>${t.rec}</td></tr>`).join("")}
 </tbody></table></div><div class="lgd">Your roster projects <b>#${myRank} of 10</b> in scoring this week .</div></div>`;
 mxDay=-1;document.getElementById("t-matchup").innerHTML=h;mxRender();
}

/* ---- profile analytics helpers ---- */
function spark(p){
 const vals=[[p.std,85,'Szn'],[p.l30,30,'L30'],[p.l15,15,'L15'],[p.l7,7,'L7']].map(([v,d,l])=>[v!=null&&d?v/d:0,l]);
 const mx=Math.max(...vals.map(x=>x[0]),0.1);
 return `<div style="display:flex;gap:8px;align-items:flex-end">${vals.map(([v,l])=>
 `<div style="flex:1;text-align:center"><div style="height:46px;display:flex;align-items:flex-end;justify-content:center"><i style="display:block;width:60%;height:${Math.max(3,Math.round(v/mx*100))}%;background:linear-gradient(180deg,var(--teal),var(--purple));border-radius:3px 3px 0 0"></i></div><div style="font-size:9px;color:var(--mut);margin-top:4px;font-weight:800">${l}</div><div style="font-size:11px;font-weight:800">${(v).toFixed(1)}</div></div>`).join("")}</div>`;
}
function comps(p){
 const same=P.filter(x=>x.ppos===p.ppos&&x.id!==p.id).sort((a,b)=>Math.abs(a.myros-p.myros)-Math.abs(b.myros-p.myros)).slice(0,3);
 return same.map(x=>`<span class="pn" data-id="${x.id}">${esc(x.name)}</span><span class="muted">(${x.myros})</span>`).join(" · ")||"—";
}
function profAnalytics(p){
 const sc=p.signal==='RISING'?'var(--grn)':p.signal==='FADING'?'var(--red)':'var(--mut)';
 return `<div class="sec"><span class="pip"></span>Analytics & Deep Dive</div>
 <div class="mrow">
 <div class="mstat"><b style="color:var(--teal)">#${p.posRank}<span style="font-size:11px;color:var(--mut)"> / ${p.posN}</span></b><span>${p.ppos} Rank</span></div>
 <div class="mstat"><b style="color:${p.vorp>=0?'var(--grn)':'var(--red)'}">${p.vorp>=0?'+':''}${p.vorp}</b><span>VORP (ROS)</span></div>
 <div class="mstat"><b>${p.consistency}<span style="font-size:11px;color:var(--mut)">/99</span></b><span>Consistency</span></div>
 <div class="mstat"><b style="color:${sc}">${p.signal}</b><span>Momentum</span></div>
 </div>
 <div class="panel" style="margin:0 0 12px">
 <div class="lgd" style="margin:0 0 8px">Scoring pace — points per day, season vs recent windows</div>
 ${spark(p)}
 <div class="lgd" style="margin-top:10px"><b>Comparable ${p.ppos}s:</b> ${comps(p)}</div>
 </div>`;
}
/* ---- ANALYTICS TAB ---- */
function gradeColor(g){return g[0]==='A'?'var(--grn)':g[0]==='B'?'var(--blu)':g==='C'?'var(--yellow)':'var(--red)';}
function leadCols(type){
 const base=[{k:"name",t:"Player",l:1,r:nmCell},{k:"mlb",t:"Tm",r:r=>`<span class="chip">${r.mlb}</span>`},{k:"pos",t:"Pos",r:r=>r.pos},
 {k:"myros",t:"My ROS",r:r=>`<b style="color:var(--gold)">${r.myros}</b>`},{k:"projWk",t:"Proj Wk",r:r=>`<b style="color:var(--grn)">${r.projWk}</b>`},
 {k:"vorp",t:"VORP",r:r=>`<b style="color:${r.vorp>=0?'var(--teal)':'var(--red)'}">${r.vorp>=0?'+':''}${r.vorp}</b>`},
 {k:"consistency",t:"Cons",r:r=>r.consistency},{k:"ft",t:"Owner",r:r=>r.ft==="FA"?'<span class="chip fa">FA</span>':`<span class="chip">${r.ft}</span>`}];
 if(type==="H") base.push({k:"OPS",t:"OPS",r:r=>(r.st.OPS??0).toFixed(3).replace(/^0/,'')},{k:"HR",t:"HR",r:r=>r.st.HR});
 else base.push({k:"ERA",t:"ERA",r:r=>r.st.ERA},{k:"K",t:"K",r:r=>r.st.K});
 return base;
}
function fill2(id,rows,cols,sk){const c=document.getElementById(id);if(c){c.innerHTML="";c.appendChild(tableEl(rows,cols,sk));}}
let apDay=0;
function apVal(p,day){
 if(day<0){const proj=p.projWk;let act=null;if(p.actual&&p.actual.some(x=>x!=null)){act=0;for(let i=0;i<7;i++)act+=(p.actual[i]!=null?p.actual[i]:0);}return{proj,act};}
 return{proj:p.daily?p.daily[day]:0,act:(p.actual&&p.actual[day]!=null)?p.actual[day]:null};
}
function apRender(){
 const M=DATA.matchup,days=M.dayRace.days;
 document.getElementById("apnav").innerHTML=`<button class="${apDay<0?'on':''}" onclick="apDay=-1;apRender()">Full Week</button>`+days.map((d,i)=>`<button class="${apDay===i?'on':''}" onclick="apDay=${i};apRender()">${d}</button>`).join("");
 const mk=(arr,who)=>arr.filter(p=>p.id).map(p=>{const v=apVal(p,apDay);return{p,proj:v.proj,act:v.act,diff:v.act==null?null:v.act-v.proj,who};});
 let rows=[...mk(M.me.hitters.concat(M.me.pitchers),M.me.name),...mk(M.opp.hitters.concat(M.opp.pitchers),M.opp.name)];
 rows.sort((a,b)=>((b.act!=null?b.act:b.proj))-((a.act!=null?a.act:a.proj)));
 document.getElementById("apbody").innerHTML=`<div class="panel"><div class="tbl"><table><thead><tr><th class="l">Player</th><th>Team</th><th>Pos</th><th>Claude Proj</th><th>ESPN Actual</th><th>Diff</th></tr></thead><tbody>
 ${rows.map(r=>`<tr><td class="l"><span class="pn" data-id="${r.p.id}">${esc(r.p.name)}</span><span class="muted" style="font-size:10px">${r.p.mlb}</span></td><td><span class="chip">${r.who===M.me.name?'YOU':'OPP'}</span></td><td>${r.p.slot||r.p.pos||'P'}</td><td style="color:var(--blu);font-weight:800">${mxFmt(r.proj)}</td><td>${r.act==null?'<span class="muted">—</span>':'<b>'+mxFmt(r.act)+'</b>'}</td><td style="color:${r.diff==null?'var(--mut)':(r.diff>=0?'var(--grn)':'var(--red)')}">${r.diff==null?'—':((r.diff>=0?'+':'')+mxFmt(r.diff))}</td></tr>`).join("")}
 </tbody></table></div><div class="lgd">Every player's Claude projection vs ESPN actual for the selected day (or full week) — both rosters, hitters + pitchers. Step through the days above.</div></div>`;
}
function analytics(){
 const A=DATA.analytics;
 let h=`<div class="panel"><b>Analytics.</b> Positional value, VORP, momentum, schedule strength and league leaders.</div>
 <div class="sec"><span class="pip"></span>Your Roster — Positional Grades</div>
 <div class="cards">${A.rosterGrade.map(g=>`<div class="card"><div class="lab">${g.pos}</div><div class="big" style="color:${gradeColor(g.grade)}">${g.grade}</div><div class="note">${esc(g.best)}<br>${g.edge>=0?'+':''}${g.edge} vs replacement</div></div>`).join("")}</div>
 <div class="lgd">Grade = your starter(s) at each spot vs a replacement-level player. Your edges are OF and SP; your soft spots are the infield corners and bullpen.</div>

 <div class="two">
 <div><div class="sec"><span class="pip"></span>Strength of Schedule (remaining)</div>
 <div class="panel"><div class="tbl"><table><thead><tr><th class="l">Team</th><th>Avg Opp</th><th>Difficulty</th></tr></thead><tbody>
 ${A.sos.map((s,i)=>`<tr style="${s.code==='WWT'?'background:rgba(46,236,174,.13)':''}"><td class="l">${esc(s.name)}${s.code==='WWT'?' ':''}</td><td>${s.avgOpp}</td><td style="font-weight:800;color:${i<3?'var(--grn)':i>6?'var(--red)':'var(--yellow)'}">${i<3?'EASY':i>6?'HARD':'MED'}</td></tr>`).join("")}
 </tbody></table></div><div class="lgd">Lower avg-opponent projection = easier remaining slate.</div></div></div>
 <div><div class="sec"><span class="pip"></span>Buy-Low Targets (on other teams)</div>
 <div id="a-buy"></div>
 <div class="sec"><span class="pip"></span>Sell-High / Regression (your roster)</div>
 <div class="panel">${A.sellHigh.length?A.sellHigh.map(p=>`<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--line)"><span class="pn" data-id="${p.id}">${esc(p.name)}</span><span class="muted">${p.pos}</span><span style="color:var(--org);font-weight:800">${p.std}→${p.myros}</span></div>`).join(""):'<span class="muted">None — your roster is projecting steady or up.</span>'}<div class="lgd">My rest-of-season projection sits below their season pace — sell on name value before regression.</div></div></div>
 </div>

 <div class="sec"><span class="pip"></span>League Leaders — Hitters (by My ROS value)</div><div id="a-lh"></div>
 <div class="sec"><span class="pip"></span>League Leaders — Pitchers (by My ROS value)</div><div id="a-lp"></div>
 <div class="sec"><span class="pip"></span> Hottest Risers (league-wide, recent pace)</div><div id="a-ris"></div>`;
 h+=`<div class="sec"><span class="pip"></span>Player Proj vs Actual — Day by Day</div><div class="daynav" id="apnav"></div><div id="apbody"></div>
 <div class="sec"><span class="pip"></span>Claude Proj vs ESPN Actual — Daily (this week)</div>
 <div class="panel"><div class="tbl"><table><thead><tr><th class="l">Day</th><th>Claude Proj</th><th>ESPN Actual</th><th>Diff</th><th>Accuracy</th></tr></thead><tbody>
 ${DATA.accuracy.dayByDay.map(d=>`<tr><td class="l">${d.day}</td><td style="color:var(--teal);font-weight:800">${d.proj}</td><td>${d.actual==null?'<span class="muted">—</span>':'<b>'+d.actual+'</b>'}</td><td style="color:${d.actual==null?'var(--mut)':(d.actual-d.proj>=0?'var(--grn)':'var(--red)')}">${d.actual==null?'—':((d.actual-d.proj>=0?'+':'')+(d.actual-d.proj))}</td><td>${d.actual==null?'—':'<b style="color:var(--grn)">'+Math.round(100-Math.abs(d.actual-d.proj)/Math.max(1,d.actual)*100)+'%</b>'}</td></tr>`).join("")}
 </tbody></table></div><div class="lgd">My daily team projection vs ESPN's actual scoring. Fills in each morning as games finalize.</div></div>
 <div class="sec"><span class="pip"></span>Claude Proj vs ESPN Actual — Weekly</div>
 <div class="panel"><div class="tbl"><table><thead><tr><th>MP</th><th class="l">Opponent</th><th>Claude Proj</th><th>ESPN Actual</th><th>Diff</th><th>Accuracy</th></tr></thead><tbody>
 ${DATA.accuracy.weekByWeek.map(w=>`<tr><td>${w.mp}</td><td class="l">${esc(w.opp)}</td><td style="color:var(--teal);font-weight:800">${w.proj}</td><td>${w.actual==null?'<span class="muted">in progress</span>':'<b>'+w.actual+'</b>'}</td><td>${w.err==null?'—':(w.err>=0?'+':'')+w.err}</td><td>${w.acc==null?'—':'<b style="color:var(--grn)">'+w.acc+'%</b>'}</td></tr>`).join("")}
 </tbody></table></div></div>`;
 document.getElementById("t-analytics").innerHTML=h;apRender();
 fill2("a-buy",A.buyLow,leadCols("ANY"),"vorp");
 fill2("a-lh",A.leadersHit,leadCols("H"),"myros");
 fill2("a-lp",A.leadersPit,leadCols("P"),"myros");
 fill2("a-ris",A.risers,leadCols("ANY"),"myros");
}

hud();dash();matchup();team();players();waiver();strategy();analytics();show("dash");
</script>
